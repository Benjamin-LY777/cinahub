name: cinehub
description: "CineHub - 家庭影院中控系统"
publish_to: 'none'
version: 1.2.1+14

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.4.0
  provider: ^6.1.2
  http: ^1.2.0
  collection: ^1.18.0
  pointycastle: ^3.9.1
  ed25519_edwards: ^0.3.1
  x25519: ^0.1.1

  multicast_dns: ^0.3.2
  web_socket_channel: ^3.0.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "../cinahub.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/wallpapers/
    - pubspec.yaml
