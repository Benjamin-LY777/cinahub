workflows:
  ios-release:
    name: CinaHub iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.cinahub.app
      vars:
        APP_ID: 6743847693
      flutter: stable
      xcode: latest
      environment_groups:
        - app_store_connect

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Set up local properties
        script: echo "flutter.minSdkVersion=21" > "$CM_BUILD_DIR/cinehub_app/android/local.properties"

      - name: Get Flutter packages
        working_directory: cinehub_app
        script: |
          flutter packages pub get

      - name: Install CocoaPods
        working_directory: cinehub_app/ios
        script: |
          pod install || true

      - name: Set up code signing settings on Xcode project
        working_directory: cinehub_app/ios
        script: |
          xcode-project use-profiles \
            --project Runner.xcodeproj

      - name: Flutter build IPA
        working_directory: cinehub_app
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - cinehub_app/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - cinehub_app/flutter_drive.log

    publishing:
      email:
        recipients:
          - hly312@users.noreply.github.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration

        submit_to_testflight: true
        submit_to_app_store: false
